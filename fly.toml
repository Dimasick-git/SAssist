# Fly.io deploy -- includes a FREE persistent volume so @usernames are reserved forever.
# How to deploy:
#   1. Install flyctl:  https://fly.io/docs/hctl/install/
#   2. fly auth login
#   3. fly launch --no-deploy --copy-config   (uses this file; app name "sassist-ryazha")
#   4. fly volumes create sassist_data --size 1 --region fra
#   5. fly deploy
#   -> public URL: https://sassist-ryazha.fly.dev  (use wss:// in the app)
app = "sassist-ryazha"
primary_region = "fra"

[build]
  dockerfile = "server/Dockerfile"

[env]
  PORT = "8080"
  DATA_DIR = "/data"
  PREMIUM_CODE = "RYAZHA-GOLD"

[[mounts]]
  source = "sassist_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  path = "/health"
  interval = "30s"
  timeout = "5s"

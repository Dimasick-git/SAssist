name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate release keystore
        run: keytool -genkeypair -dname "CN=SAssist,O=Ryazha,C=US" -keystore "$GITHUB_WORKSPACE/android/app/release.jks" -storepass sassist123 -keypass sassist123 -alias sassist -keyalg RSA -keysize 2048 -validity 10000

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/android/app/release.jks
          KEYSTORE_PASSWORD: sassist123
          KEY_ALIAS: sassist
          KEY_PASSWORD: sassist123
        run: gradle assembleRelease --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAssist-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
